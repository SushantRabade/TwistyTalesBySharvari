<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="16" cy="16" r="14" fill="url(#bg)" stroke="#fff" stroke-width="1"/>
  
  <!-- Sunflower emoji representation -->
  <text x="16" y="22" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white">🌻</text>
  
  <!-- Small decorative elements -->
  <circle cx="8" cy="8" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="24" cy="8" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="8" cy="24" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="24" cy="24" r="1.5" fill="#fff" opacity="0.8"/>
</svg>
