<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Large sunflower emoji -->
  <text x="90" y="120" font-family="Arial, sans-serif" font-size="80" text-anchor="middle" fill="white">🌻</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="8" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="30" r="8" fill="#fff" opacity="0.6"/>
  <circle cx="30" cy="150" r="8" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="150" r="8" fill="#fff" opacity="0.6"/>
  
  <!-- Small flowers around the edges -->
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">🌸</text>
  <text x="150" y="35" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">🌸</text>
  <text x="30" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">🌸</text>
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#fff">🌸</text>
</svg>
